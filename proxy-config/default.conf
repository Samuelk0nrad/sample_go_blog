map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# Enable dynamic DNS resolution for upstream services
resolver 127.0.0.11:53 valid=10s;
resolver_timeout 5s;

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# JSON logging format
log_format json_combined escape=json '{'
  '"time_local":"$time_local",'
  '"remote_addr":"$remote_addr",'
  '"request":"$request",'
  '"status":$status,'
  '"body_bytes_sent":$body_bytes_sent,'
  '"request_time":$request_time,'
  '"upstream_addr":"$upstream_addr",'
  '"upstream_response_time":"$upstream_response_time",'
  '"http_user_agent":"$http_user_agent",'
  '"http_referer":"$http_referer"'
'}';

# Access log with JSON format and buffering
access_log /var/log/nginx/access.log json_combined buffer=32k flush=5s;

server {
  listen 443 ssl;
  server_name blog.moorph.local;

  ssl_certificate /certs/blog.moorph.local.pem;
  ssl_certificate_key /certs/blog.moorph.local-key.pem;
  #
  # SSL/TLS hardening
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  
  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location / {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

server {
  listen 443 ssl;
  server_name file.moorph.local;

  ssl_certificate /certs/file.moorph.local.pem;
  ssl_certificate_key /certs/file.moorph.local-key.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location / {
    proxy_pass http://minio:9000;
    proxy_http_version 1.1;

    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_buffering off;
    proxy_request_buffering off;
    client_max_body_size 0;
  }
}

server {
  listen 80;
  server_name blog.moorph.local;
  return 301 https://$host$request_uri;
}

server {
  listen 80 default_server;
  listen 443 ssl default_server;
  server_name _;
  ssl_certificate /certs/blog.moorph.local.pem;
  ssl_certificate_key /certs/blog.moorph.local-key.pem;

  error_page 404 /not-found.html;

  location = /not-found.html {
    root /var/www/html;
    internal;
  }

  location / {
    return 404;
  }
}
