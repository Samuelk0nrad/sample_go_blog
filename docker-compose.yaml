services:
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgadmin.com
      PGADMIN_DEFAULT_PASSWORD: Kennwort1
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - internal


  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Kennwort1
      POSTGRES_DB: blog
    volumes:
      - blog-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - internal

  minio:
    image: quay.io/minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # public endpoint
      - "9001:9001" # admin web console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: Kennwort1
    volumes:
      - minio-data:/data
    networks:
      - internal


  backend:
    build:
      context: ./backend/
      dockerfile: Dockerfile
    container_name: blog_backend
    command: >
      sh -c "
        update-ca-certificates &&
        /go/bin/air
      "
    volumes:
      - ./backend/:/app
      - /home/samuel/.local/share/mkcert/:/usr/local/share/ca-certificates
    # ports:
      # - "8080:8080"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  #################
  ####  Proxy  ####
  #################
  proxy:
    image: nginx:latest
    restart: unless-stopped
    networks:
      internal:
        aliases:
          - blog.moorph.local
          - file.moorph.local
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy-config/default.conf:/etc/nginx/conf.d/default.conf
      - ./proxy-config/cert:/certs:ro
      - ./proxy-config/not-found.html:/var/www/html/not-found.html:ro
      - ./proxy-config/50x.html:/var/www/html/50x.html:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H 'Host: blog.moorph.local' http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s


volumes:
  minio-data:
  pgadmin-data:
  blog-data:

networks:
  internal:
    driver: bridge

