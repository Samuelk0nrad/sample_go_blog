services:
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgadmin.com
      PGADMIN_DEFAULT_PASSWORD: Kennwort1
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - internal


  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Kennwort1
      POSTGRES_DB: blog
    volumes:
      - blog-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - internal

  minio:
    image: quay.io/minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # public endpoint
      - "9001:9001" # admin web console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: Kennwort1
    volumes:
      - minio-data:/data
    networks:
      - internal

  backend:
    build:
      context: ./backend/
      dockerfile: Dockerfile
    container_name: blog_backend
    volumes:
      - ./backend/:/app
    ports:
      - "8080:8080"
    networks:
      - internal

volumes:
  minio-data:
  pgadmin-data:
  blog-data:

networks:
  internal:
    driver: bridge

